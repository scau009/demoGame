services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - game_data:/app/data
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - TOKEN_TTL_HOURS=${TOKEN_TTL_HOURS:-24}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  game_data:
